<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fire: #ff4500;
            --ember: #ff8c00;
            --ash: #1a1a1a;
            --smoke: #2c2c2c;
            --light: #f5f0eb;
            --muted: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background-color: var(--ash);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,69,0,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,140,0,0.05) 0%, transparent 50%);
            font-family: 'DM Sans', sans-serif;
            color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--smoke);
            border: 1px solid rgba(255,69,0,0.2);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255,69,0,0.08), 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            background: linear-gradient(135deg, #ff4500, #ff8c00);
            padding: 32px 36px 28px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '🔥';
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 56px;
            opacity: 0.25;
        }

        .card-header h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 3px;
            color: #fff;
            line-height: 1;
        }

        .card-header p {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            margin-top: 6px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 500;
        }

        .card-body {
            padding: 32px 36px 36px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            animation: fadeUp 0.5s ease both;
        }

        .field:nth-child(1)  { animation-delay: 0.05s; }
        .field:nth-child(2)  { animation-delay: 0.10s; }
        .field:nth-child(3)  { animation-delay: 0.15s; }
        .field:nth-child(4)  { animation-delay: 0.20s; }
        .field:nth-child(5)  { animation-delay: 0.25s; }
        .field:nth-child(6)  { animation-delay: 0.30s; }
        .field:nth-child(7)  { animation-delay: 0.35s; }
        .field:nth-child(8)  { animation-delay: 0.40s; }
        .field:nth-child(9)  { animation-delay: 0.45s; }

        .field.full { grid-column: 1 / -1; }

        label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type="text"] {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 3px;
            padding: 10px 14px;
            color: var(--light);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            width: 100%;
        }

        input[type="text"]::placeholder { color: rgba(255,255,255,0.2); }

        input[type="text"]:focus {
            border-color: var(--fire);
            background: rgba(255,69,0,0.06);
        }

        .btn {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--fire), var(--ember));
            border: none;
            border-radius: 3px;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .result {
            margin-top: 24px;
            padding: 20px 24px;
            background: rgba(255,69,0,0.08);
            border: 1px solid rgba(255,69,0,0.3);
            border-radius: 3px;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }

        .result-label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--ember);
            font-weight: 500;
        }

        .result-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            color: var(--fire);
            line-height: 1.1;
            margin-top: 4px;
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 28px 0 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>FWI Prediction</h1>
            <p>Algerian Forest Fire — Weather Index Model</p>
        </div>

        <div class="card-body">
            <form action="{{ url_for('predict_datapoint') }}" method="post">
                <div class="grid">
                    <div class="field">
                        <label>Temperature</label>
                        <input type="text" name="Temperature" placeholder="e.g. 29" required>
                    </div>
                    <div class="field">
                        <label>RH (%)</label>
                        <input type="text" name="RH" placeholder="e.g. 57" required>
                    </div>
                    <div class="field">
                        <label>Wind Speed (Ws)</label>
                        <input type="text" name="Ws" placeholder="e.g. 18" required>
                    </div>
                    <div class="field">
                        <label>Rain (mm)</label>
                        <input type="text" name="Rain" placeholder="e.g. 0" required>
                    </div>
                    <div class="field">
                        <label>FFMC</label>
                        <input type="text" name="FFMC" placeholder="e.g. 85.4" required>
                    </div>
                    <div class="field">
                        <label>DMC</label>
                        <input type="text" name="DMC" placeholder="e.g. 3.4" required>
                    </div>
                    <div class="field">
                        <label>ISI</label>
                        <input type="text" name="ISI" placeholder="e.g. 0.5" required>
                    </div>
                    <div class="field">
                        <label>Classes (0 or 1)</label>
                        <input type="text" name="Classes" placeholder="0 or 1" required>
                    </div>
                    <div class="field full">
                        <label>Region (0 or 1)</label>
                        <input type="text" name="Region" placeholder="0 = Bejaia  |  1 = Sidi Bel-Abbes" required>
                    </div>
                </div>

                <input type="submit" value="PREDICT" class="btn">
            </form>

            {% if result %}
            <div class="divider"></div>
            <div class="result">
                <div class="result-label">Fire Weather Index</div>
                <div class="result-value">{{ result }}</div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
